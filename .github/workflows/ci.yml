name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-governance:
    name: Docs Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run docs governance checks
        run: python scripts/check_docs_governance.py

  artifact-governance:
    name: Artifact Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run artifact governance checks
        run: python scripts/check_artifact_governance.py

  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Run schema validation
        run: python scripts/validate_schemas.py

  upstream-validation:
    name: Upstream Rule Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Run upstream validation pipeline
        run: python scripts/validate_rules.py --input artifacts/lme_rules_v2_2/atomic_rules.json --semantic-rules artifacts/lme_rules_v2_2/semantic_rules.json --fail-on-error

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Run unit tests
        run: python -m unittest discover -s tests -t . -v

  smoke-test:
    name: End-to-End Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run end-to-end smoke
        run: python .github/workflows/smoke_test.py

  governance-signals:
    name: Governance Signals
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Compute governance signals
        run: python main.py governance-signals --output runs/governance_signals.json

      - name: Upload governance signals
        uses: actions/upload-artifact@v4
        with:
          name: governance-signals
          path: runs/governance_signals.json
          retention-days: 1

  release-governance:
    name: Release Governance
    runs-on: ubuntu-latest
    needs: governance-signals
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download governance signals
        uses: actions/download-artifact@v4
        with:
          name: governance-signals
          path: runs/

      - name: Run release governance checks
        run: python scripts/check_release_governance.py
