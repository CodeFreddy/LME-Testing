# Cucumber Configuration
# https://github.com/cucumber/cucumber/blob/main/cucumber.yml

<%
  # Profile definitions
  std_opts = "--format #{ENV['CUCUMBER_FORMAT'] || 'progress'}"
  std_opts += " --format html --out reports/cucumber.html" if ENV['GENERATE_HTML']
  std_opts += " --format junit --out reports/junit" if ENV['GENERATE_JUNIT']
  std_opts += " --tags '#{ENV['CUCUMBER_TAGS']}'" if ENV['CUCUMBER_TAGS']
%>

# Standard profiles
default: <%= std_opts %> --publish-quiet

# Development - fast feedback
dev: <%= std_opts %> --tags '@smoke'

# Regression - full test suite
regression: <%= std_opts %> --tags 'not @skip_regression'

# API only tests (no browser)
api: <%= std_opts %> --tags '@api'

# Web tests (requires browser)
web: <%= std_opts %> --tags '@web'

# Post-trade operations
post_trade: <%= std_opts %> --tags '@post_trade'

# Fast smoke test
smoke: <%= std_opts %> --tags '@smoke'

# Debug mode with pry
debug: <%= std_opts %> --tags '@debug' --pry

# Parallel execution
parallel: <%= std_opts %> --parallel-mode

# Strict mode - fail on undefined steps
strict: <%= std_opts %> --strict

# Pretty format for development
pretty: --format pretty --publish-quiet

# JSON output for CI/CD integration
json: --format json --out reports/cucumber.json --publish-quiet

# Allure reporting (if configured)
allure: --format AllureCucumber::CucumberFormatter --out <%= ENV['ALLURE_RESULTS_DIR'] || 'reports/allure-results' %>
